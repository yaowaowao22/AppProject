<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワリカン名人 — iOS UI/UX Prototype</title>
  <!--
    Design: "琥珀夜 / Amber Night"
    iOS UI/UX: Apple HIG準拠 / iPhone 15 Pro (390×844pt)
    Accent: #FF6B35 (暖橙) × #FFB800 (金) × #FFFBF5 (クリーム)
    Screens: 計算 / 傾斜設定 / 結果 / 履歴
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Brand */
      --orange: #FF6B35;
      --orange-dim: #E85C27;
      --gold: #FFB800;
      --gold-dim: #E5A500;
      --cream: #FFFBF5;
      --card: #FFF4E8;
      --warm-gray: #F5EFE5;
      --sep: #E8DDD0;
      /* Text */
      --t1: #1C1A18;
      --t2: #6C6057;
      --t3: #ADA69E;
      /* System */
      --green: #30D158;
      --red: #FF453A;
      --line: #06C755;
      --blue: #0A84FF;
      /* Dark amber bg for hero */
      --hero-bg: #0F0500;
      --hero-mid: #1A0800;
      /* Ma spacing */
      --s4: 4px; --s8: 8px; --s16: 16px; --s24: 24px; --s32: 32px; --s48: 48px;
    }

    body {
      background: radial-gradient(ellipse at 30% 20%, #3D1500 0%, #1A0800 40%, #0A0400 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      padding: 40px 16px;
      gap: 32px;
      flex-wrap: wrap;
    }

    /* ===== PHONE FRAME ===== */
    .phone-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .phone-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,180,80,0.5);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .iphone {
      position: relative;
      width: 393px;
      height: 852px;
      background: #3C3835;
      border-radius: 55px;
      padding: 12px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10),
        0 60px 160px rgba(0,0,0,0.7),
        0 24px 64px rgba(255,107,53,0.12),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .iphone::before {
      content: '';
      position: absolute;
      left: -3px; top: 130px;
      width: 3px; height: 30px;
      background: #2A2724;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 46px 0 #2A2724, 0 92px 0 #2A2724;
    }
    .iphone::after {
      content: '';
      position: absolute;
      right: -3px; top: 178px;
      width: 3px; height: 72px;
      background: #2A2724;
      border-radius: 0 2px 2px 0;
    }

    .screen-container {
      width: 100%; height: 100%;
      background: var(--cream);
      border-radius: 45px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Dynamic Island */
    .di {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 126px; height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 50;
    }

    /* Status Bar */
    .sbar {
      height: 59px;
      padding: 16px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      transition: color 0.3s;
    }
    .sbar.dark { background: var(--hero-bg); }
    .sbar.light { background: var(--cream); }
    .sbar-time {
      font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 700;
    }
    .sbar.dark .sbar-time { color: rgba(255,255,255,0.9); }
    .sbar.light .sbar-time { color: var(--t1); }
    .sbar-icons {
      display: flex; align-items: center; gap: 5px;
    }
    .sbar-icons svg { flex-shrink: 0; }

    /* App Content */
    .app-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Screens */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      background: var(--cream);
    }
    .screen::-webkit-scrollbar { display: none; }
    .screen.active { display: flex; }
    .screen.slide-in { animation: slideIn 0.32s cubic-bezier(0.22,0.61,0.36,1) both; }
    .screen.slide-out { animation: slideOut 0.28s cubic-bezier(0.55,0,1,0.45) both; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(-30%); opacity: 0.6; } }

    /* Tab Bar */
    .tab-bar {
      height: 83px;
      background: rgba(255,251,245,0.95);
      backdrop-filter: blur(20px) saturate(180%);
      border-top: 0.5px solid var(--sep);
      display: flex;
      align-items: flex-start;
      padding-top: 8px;
      flex-shrink: 0;
      position: relative;
      z-index: 30;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 2px 0;
      position: relative;
      transition: transform 0.12s;
      min-height: 44px;
    }
    .tab-item:active { transform: scale(0.88); }
    .tab-indicator {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 28px; height: 3px;
      background: var(--orange);
      border-radius: 0 0 3px 3px;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tab-item.active .tab-indicator { transform: translateX(-50%) scaleX(1); }
    .tab-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--t3); }
    .tab-item.active .tab-icon { color: var(--orange); }
    .tab-lbl { font-size: 10px; font-weight: 500; color: var(--t3); }
    .tab-item.active .tab-lbl { color: var(--orange); }

    /* Nav Bar */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 10px;
      background: rgba(255,251,245,0.95);
      backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 10;
      border-bottom: 0.5px solid var(--sep);
      flex-shrink: 0;
    }
    .nav-title { font-size: 17px; font-weight: 600; color: var(--t1); }
    .nav-btn {
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      border: none; background: none; cursor: pointer;
      color: var(--orange); font-size: 13px; font-weight: 700;
      transition: background 0.12s;
    }
    .nav-btn:active { background: rgba(255,107,53,0.12); }

    /* ====================================================
       SCREEN 1 — CALCULATOR
    ==================================================== */
    .hero {
      background: linear-gradient(160deg, var(--hero-bg) 0%, #2A1000 60%, #1A0800 100%);
      padding: 20px 20px 28px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -50px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,184,0,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -20px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(255,107,53,0.10) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-label {
      font-size: 11px; font-weight: 600;
      color: rgba(255,184,0,0.65);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .hero-input-row {
      display: flex; align-items: baseline; gap: 6px;
      min-height: 68px;
    }
    .hero-yen {
      font-family: 'Inter', sans-serif;
      font-size: 30px; font-weight: 800;
      color: rgba(255,255,255,0.55);
      line-height: 1;
    }
    .hero-amount {
      font-family: 'Inter', sans-serif;
      font-size: 60px; font-weight: 900;
      color: #FFFFFF;
      line-height: 1;
      letter-spacing: -2.5px;
      transition: color 0.15s;
      font-variant-numeric: tabular-nums;
    }
    .hero-amount.placeholder { color: rgba(255,255,255,0.25); }
    .hero-amount.error { color: rgba(255,69,58,0.9); }
    .hero-cursor {
      display: inline-block;
      width: 3px; height: 48px;
      background: var(--orange);
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    .hero-note {
      font-size: 12px; color: rgba(255,184,0,0.5);
      margin-top: 6px;
    }

    /* Preset chips */
    .preset-row {
      display: flex; gap: 8px;
      padding: 12px 16px 0;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .preset-row::-webkit-scrollbar { display: none; }
    .preset-chip {
      display: flex; align-items: center;
      padding: 0 14px;
      height: 32px;
      border-radius: 16px;
      background: rgba(255,107,53,0.10);
      border: 1px solid rgba(255,107,53,0.25);
      font-size: 13px; font-weight: 600; color: var(--orange);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
      font-family: 'Inter', sans-serif;
      font-variant-numeric: tabular-nums;
    }
    .preset-chip:active { background: rgba(255,107,53,0.22); transform: scale(0.95); }

    /* People stepper */
    .people-section {
      padding: 16px 16px 0;
      flex-shrink: 0;
    }
    .people-label {
      font-size: 11px; font-weight: 600;
      color: var(--t3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .people-row {
      display: flex; align-items: center; gap: 12px;
    }
    .stepper-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--card);
      border: 1.5px solid var(--sep);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 20px; font-weight: 700; color: var(--orange);
      transition: all 0.12s cubic-bezier(0.34,1.56,0.64,1);
    }
    .stepper-btn:active { transform: scale(0.88); background: rgba(255,107,53,0.12); }
    .pip-row {
      flex: 1;
      display: flex; flex-wrap: wrap; gap: 6px;
      align-items: center;
    }
    .pip {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,107,53,0.2);
      border: 1.5px solid rgba(255,107,53,0.35);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .pip.filled {
      background: var(--orange);
      border-color: var(--orange);
      box-shadow: 0 0 6px rgba(255,107,53,0.5);
    }
    .stepper-count {
      font-family: 'Inter', sans-serif;
      font-size: 22px; font-weight: 800;
      color: var(--t1);
      min-width: 36px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    /* Per-person preview */
    .per-person-bar {
      margin: 16px 16px 0;
      padding: 12px 16px;
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--sep);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .ppb-label { font-size: 13px; color: var(--t2); font-weight: 500; }
    .ppb-amount {
      font-family: 'Inter', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--orange);
      font-variant-numeric: tabular-nums;
    }
    .ppb-amount.zero { color: var(--t3); }

    /* Tip row */
    .tip-row {
      display: flex; gap: 8px; padding: 12px 16px 0;
      flex-shrink: 0;
    }
    .tip-btn {
      flex: 1;
      height: 36px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--sep);
      font-size: 12px; font-weight: 600; color: var(--t2);
      cursor: pointer;
      transition: all 0.12s;
    }
    .tip-btn:active { background: rgba(255,184,0,0.15); color: var(--gold); }
    .tip-btn.active {
      background: rgba(255,184,0,0.15);
      border-color: var(--gold);
      color: var(--gold-dim);
    }

    /* Numpad */
    .numpad {
      padding: 8px 16px 16px;
      flex-shrink: 0;
    }
    .numpad-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .num-key {
      height: 56px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--sep);
      font-family: 'Inter', sans-serif;
      font-size: 22px; font-weight: 600;
      color: var(--t1);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s cubic-bezier(0.34,1.56,0.64,1);
      user-select: none;
    }
    .num-key:active { transform: scale(0.93); background: rgba(255,107,53,0.12); }
    .num-key.del { background: rgba(255,107,53,0.08); color: var(--orange); }
    .num-key.del:active { background: rgba(255,107,53,0.2); }
    .num-key.zero { grid-column: span 2; }

    /* Calc button */
    .calc-btn {
      margin: 8px 16px 0;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--orange) 0%, #FF8F00 100%);
      border: none;
      font-size: 17px; font-weight: 700; color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(255,107,53,0.40);
      transition: all 0.14s cubic-bezier(0.34,1.56,0.64,1);
      flex-shrink: 0;
    }
    .calc-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(255,107,53,0.3); }

    /* Flash error */
    @keyframes errorFlash {
      0%{background:rgba(255,69,58,0);}
      30%{background:rgba(255,69,58,0.15);}
      100%{background:rgba(255,69,58,0);}
    }
    .error-flash { animation: errorFlash 0.6s ease; }

    /* ====================================================
       SCREEN 2 — TILT (傾斜設定)
    ==================================================== */
    .tilt-summary {
      margin: 0 16px 0;
      padding: 14px 16px;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--sep);
      flex-shrink: 0;
    }
    .ts-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .ts-label { font-size: 13px; font-weight: 500; color: var(--t2); }
    .ts-val { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; color: var(--t1); font-variant-numeric: tabular-nums; }
    .ts-bar-bg {
      height: 4px; border-radius: 2px;
      background: var(--warm-gray);
      overflow: hidden;
    }
    .ts-bar-fill {
      height: 100%; border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
    }
    .ts-bar-fill.ok { background: var(--green); }
    .ts-bar-fill.ng { background: var(--red); }
    .ts-status {
      margin-top: 6px;
      font-size: 11px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .ts-status.ok { color: var(--green); }
    .ts-status.ng { color: var(--red); }

    .member-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
    .member-card {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--sep);
      padding: 14px;
    }
    .mc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .mc-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .mc-name { font-size: 15px; font-weight: 600; color: var(--t1); flex: 1; }
    .mc-role {
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 11px; font-weight: 700;
      border: 1.5px solid;
    }
    .mc-role.kanji { background: rgba(255,184,0,0.12); color: var(--gold-dim); border-color: rgba(255,184,0,0.35); }
    .mc-role.normal { background: rgba(255,107,53,0.08); color: var(--orange); border-color: rgba(255,107,53,0.25); }
    .mc-role.discount { background: rgba(48,209,88,0.10); color: #20A844; border-color: rgba(48,209,88,0.3); }

    .mc-amount-row { display: flex; align-items: center; gap: 8px; }
    .mc-amount-label { font-size: 12px; color: var(--t3); }
    .mc-amount-input {
      flex: 1;
      height: 36px;
      border-radius: 10px;
      border: 1.5px solid var(--sep);
      background: var(--cream);
      padding: 0 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 700;
      color: var(--t1);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .mc-amount-input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
    }

    /* ====================================================
       SCREEN 3 — RESULTS
    ==================================================== */
    .result-hero {
      background: linear-gradient(160deg, var(--hero-bg) 0%, #2A1000 70%, #1A0800 100%);
      padding: 28px 24px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .rh-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(255,184,0,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .rh-lbl { font-size: 12px; font-weight: 600; color: rgba(255,184,0,0.65); letter-spacing: 0.1em; margin-bottom: 10px; }
    .rh-amount-row { display: flex; align-items: baseline; justify-content: center; gap: 8px; position: relative; }
    .rh-yen { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 800; color: rgba(255,255,255,0.55); }
    .rh-amount {
      font-family: 'Inter', sans-serif;
      font-size: 68px; font-weight: 900;
      color: #FFFFFF;
      line-height: 1; letter-spacing: -3px;
      font-variant-numeric: tabular-nums;
    }
    .rh-sub { font-size: 13px; color: rgba(255,184,0,0.55); margin-top: 8px; }
    .coin-badge {
      position: absolute;
      top: -10px; right: -6px;
      width: 40px; height: 40px;
      background: radial-gradient(circle at 35% 30%, #FFE566 0%, #FFB800 50%, #CC8800 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 12px rgba(255,184,0,0.6);
      animation: coinReveal 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes coinReveal {
      from { transform: scale(0) rotate(-30deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .shimmer-bar {
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      animation: shimmer 2.5s 0.6s ease infinite;
    }
    @keyframes shimmer { 0%{left:-60%} 100%{left:160%} }

    /* Confetti */
    .confetti-container {
      position: absolute; inset: 0;
      pointer-events: none; overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      border-radius: 2px;
      animation: confettiFall linear both;
    }
    @keyframes confettiFall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      to { transform: translateY(200px) rotate(720deg); opacity: 0; }
    }

    /* Individual list */
    .result-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .result-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--sep);
    }
    .rr-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .rr-name { font-size: 14px; font-weight: 600; color: var(--t1); flex: 1; }
    .rr-role-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 6px;
    }
    .rr-role-badge.kanji { background: rgba(255,184,0,0.15); color: var(--gold-dim); }
    .rr-role-badge.normal { background: rgba(255,107,53,0.1); color: var(--orange); }
    .rr-role-badge.discount { background: rgba(48,209,88,0.1); color: #20A844; }
    .rr-amount {
      font-family: 'Inter', sans-serif;
      font-size: 16px; font-weight: 800;
      color: var(--t1);
      font-variant-numeric: tabular-nums;
    }

    /* Share buttons */
    .share-row { display: flex; gap: 10px; padding: 0 16px 16px; flex-shrink: 0; }
    .share-line {
      flex: 1;
      height: 52px; border-radius: 14px;
      background: var(--line);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 15px; font-weight: 700; color: #fff;
      box-shadow: 0 4px 16px rgba(6,199,85,0.4);
      transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
    }
    .share-line:active { transform: scale(0.96); }
    .share-save {
      flex: 1;
      height: 52px; border-radius: 14px;
      background: var(--card);
      border: 1.5px solid var(--sep);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 15px; font-weight: 700; color: var(--t2);
      transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
    }
    .share-save:active { transform: scale(0.96); background: rgba(255,107,53,0.08); }

    /* Share Sheet Modal */
    .share-sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: none;
      align-items: flex-end;
    }
    .share-sheet-overlay.open {
      display: flex;
      animation: overlayFadeIn 0.2s ease;
    }
    @keyframes overlayFadeIn { from{opacity:0} to{opacity:1} }
    .share-sheet {
      width: 100%;
      background: var(--cream);
      border-radius: 20px 20px 0 0;
      padding: 12px 16px 32px;
      animation: sheetUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--sep);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .sheet-title { font-size: 13px; font-weight: 600; color: var(--t3); text-align: center; margin-bottom: 16px; }
    .sheet-apps {
      display: flex; justify-content: space-around;
      margin-bottom: 16px;
    }
    .sheet-app {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer;
      min-width: 56px; min-height: 44px;
    }
    .sheet-app-icon {
      width: 56px; height: 56px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .sheet-app-lbl { font-size: 11px; color: var(--t2); }
    .sheet-actions { display: flex; flex-direction: column; gap: 8px; }
    .sheet-action-btn {
      height: 52px; border-radius: 14px;
      background: var(--card); border: 1px solid var(--sep);
      font-size: 15px; font-weight: 600; color: var(--t1);
      cursor: pointer;
      transition: background 0.12s;
    }
    .sheet-action-btn:active { background: rgba(255,107,53,0.1); }
    .sheet-cancel {
      height: 52px; border-radius: 14px;
      background: var(--card); border: none;
      font-size: 17px; font-weight: 600; color: var(--orange);
      cursor: pointer; margin-top: 8px;
    }

    /* Toast */
    .toast {
      position: absolute;
      bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(28,26,24,0.92);
      color: #fff;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px; font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 50;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ====================================================
       SCREEN 4 — HISTORY
    ==================================================== */
    .history-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      padding: 40px;
    }
    .history-empty-icon { font-size: 64px; opacity: 0.25; }
    .history-empty-title { font-size: 17px; font-weight: 600; color: var(--t2); text-align: center; }
    .history-empty-sub { font-size: 14px; color: var(--t3); text-align: center; line-height: 1.5; }

    .history-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
    .history-card {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--sep);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.12s;
    }
    .history-card:active { transform: scale(0.98); }
    .hc-swipe-bg {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 80px;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      gap: 4px;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      border-radius: 0 14px 14px 0;
    }
    .history-card.swiped .hc-swipe-bg { transform: translateX(0); }
    .hc-main {
      padding: 14px;
      display: flex; align-items: center; gap: 12px;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .history-card.swiped .hc-main { transform: translateX(-80px); }
    .hc-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, var(--orange), #FF8F00);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .hc-info { flex: 1; }
    .hc-title { font-size: 15px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
    .hc-meta { font-size: 12px; color: var(--t3); }
    .hc-amount {
      font-family: 'Inter', sans-serif;
      font-size: 18px; font-weight: 800; color: var(--orange);
      font-variant-numeric: tabular-nums;
    }
    .hc-sub { font-size: 11px; color: var(--t3); text-align: right; }

    /* Section header */
    .section-header {
      padding: 20px 16px 10px;
      font-size: 22px; font-weight: 700; color: var(--t1);
      flex-shrink: 0;
    }
    .section-sub {
      padding: 0 16px 14px;
      font-size: 13px; color: var(--t2);
      flex-shrink: 0;
    }

    /* Utility */
    .divider { height: 0.5px; background: var(--sep); margin: 8px 0; flex-shrink: 0; }
    .spacer8 { height: 8px; flex-shrink: 0; }
    .spacer16 { height: 16px; flex-shrink: 0; }

    /* Screen-specific sbar dark */
    #screen-calc .sbar,
    #screen-result .sbar { background: var(--hero-bg); }
    #screen-calc .sbar .sbar-time,
    #screen-result .sbar .sbar-time { color: rgba(255,255,255,0.9); }
    #screen-tilt .sbar,
    #screen-history .sbar { background: var(--cream); }
  </style>
</head>

<!-- ========== PHONE ========== -->

      <!-- Tab Bar -->

              <path d="M19 12v3"/>
            </svg>
          </div>
          <span class="tab-lbl">傾斜</span>
        </button>
        <button class="tab-item" id="tab-result" onclick="goTab('result')">
          <div class="tab-indicator"></div>
          <div class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2L14.4 9H22L15.8 13.4L18.2 20.4L12 16L5.8 20.4L8.2 13.4L2 9H9.6L12 2z"/>
            </svg>
          </div>
          <span class="tab-lbl">結果</span>
        </button>
        <button class="tab-item" id="tab-history" onclick="goTab('history')">
          <div class="tab-indicator"></div>
          <div class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="9"/>
              <path d="M12 7v5l3 3"/>
            </svg>
          </div>
          <span class="tab-lbl">履歴</span>
        </button>
      </div>

    </div><!-- /screen-container -->
  </div><!-- /iphone -->
</div>

<!-- Share Sheet (inside phone) -->
<div class="share-sheet-overlay" id="shareOverlay" onclick="closeShareSheet(event)">
  <div class="share-sheet" id="shareSheetPanel">
    <div class="sheet-handle"></div>
    <div class="sheet-title">共有方法を選択</div>
    <div class="sheet-apps">
      <div class="sheet-app" onclick="shareAction('LINE')">
        <div class="sheet-app-icon" style="background:#06C755">💬</div>
        <span class="sheet-app-lbl">LINE</span>
      </div>
      <div class="sheet-app" onclick="shareAction('Twitter')">
        <div class="sheet-app-icon" style="background:#000">𝕏</div>
        <span class="sheet-app-lbl">X</span>
      </div>
      <div class="sheet-app" onclick="shareAction('コピー')">
        <div class="sheet-app-icon" style="background:#8A8680">📋</div>
        <span class="sheet-app-lbl">コピー</span>
      </div>
      <div class="sheet-app" onclick="shareAction('メッセージ')">
        <div class="sheet-app-icon" style="background:#30D158">💬</div>
        <span class="sheet-app-lbl">メッセージ</span>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="sheet-action-btn" onclick="shareAction('AirDrop')">AirDropで送信</button>
      <button class="sheet-action-btn" onclick="shareAction('メール')">メールで送信</button>
    </div>
    <button class="sheet-cancel" onclick="closeShareSheet()">キャンセル</button>
  </div>
</div>

<script>
  // ===== State =====
  let state = {
    amountStr: '',
    people: 4,
    tipPct: 0,
    members: [],
    history: [
      { id:1, title:'新年会 2026', people:8, total:48000, perPerson:6000, date:'2026/01/15', emoji:'🎍' },
      { id:2, title:'歓迎会', people:6, total:36000, perPerson:6000, date:'2026/02/20', emoji:'🍻' },
      { id:3, title:'誕生日ディナー', people:4, total:28000, perPerson:7000, date:'2026/03/10', emoji:'🎂' },
    ],
    nextId: 4,
    currentTab: 'calc',
  };

  const AVATAR_COLORS = ['#FF6B35','#FFB800','#30D158','#5AC8FA','#BF5AF2','#FF453A','#FF9F0A','#0A84FF'];
  const NAMES = ['田中','鈴木','山田','佐藤','伊藤','渡辺','高橋','小林'];
  const ROLES = { kanji:'幹事', normal:'通常', discount:'割引' };

  // ===== Init =====
  function init() {
    renderPips();
    initMembers();
    renderHistory();
    updatePerPersonPreview();
  }

  function renderPips() {
    const row = document.getElementById('pipRow');
    row.innerHTML = '';
    const max = Math.min(state.people, 12);
    for (let i = 0; i < max; i++) {
      const pip = document.createElement('div');
      pip.className = 'pip' + (i < state.people ? ' filled' : '');
      row.appendChild(pip);
    }
    if (state.people > 12) {
      const more = document.createElement('div');
      more.style.cssText = 'font-size:11px;color:var(--orange);font-weight:700;padding:0 4px';
      more.textContent = `+${state.people-12}`;
      row.appendChild(more);
    }
  }

  function initMembers() {
    state.members = [];
    for (let i = 0; i < state.people; i++) {
      state.members.push({
        id: i,
        name: NAMES[i % NAMES.length],
        role: i === 0 ? 'kanji' : 'normal',
        amount: 0,
      });
    }
    recalcMemberAmounts();
    renderMemberList();
  }

  function recalcMemberAmounts() {
    const total = getTotal();
    if (total <= 0 || state.people <= 0) return;
    const base = Math.ceil(total / state.people);
    state.members.forEach((m, i) => {
      if (m.role === 'kanji') m.amount = Math.ceil(base * 1.2);
      else if (m.role === 'discount') m.amount = Math.floor(base * 0.8);
      else m.amount = base;
    });
  }

  function getTotal() {
    const raw = parseFloat(state.amountStr) || 0;
    return Math.round(raw * (1 + state.tipPct / 100));
  }

  function getPerPerson() {
    const t = getTotal();
    if (t <= 0 || state.people <= 0) return 0;
    return Math.ceil(t / state.people);
  }

  function updatePerPersonPreview() {
    const pp = getPerPerson();
    const el = document.getElementById('perPersonPreview');
    if (pp <= 0) {
      el.textContent = '¥—';
      el.className = 'ppb-amount zero';
    } else {
      el.textContent = '¥' + pp.toLocaleString('ja-JP');
      el.className = 'ppb-amount';
    }
  }

  // ===== Numpad =====
  function numInput(ch) {
    if (ch === '.' && state.amountStr.includes('.')) return;
    if (state.amountStr.length >= 9) return;
    if (state.amountStr === '' && ch === '0') return;
    state.amountStr += ch;
    updateHero();
    updatePerPersonPreview();
    haptic();
  }

  function numDelete() {
    state.amountStr = state.amountStr.slice(0, -1);
    updateHero();
    updatePerPersonPreview();
    haptic();
  }

  function setPreset(val) {
    state.amountStr = String(val);
    updateHero();
    updatePerPersonPreview();
    haptic();
  }

  function updateHero() {
    const el = document.getElementById('heroAmount');
    const note = document.getElementById('heroNote');
    if (!state.amountStr) {
      el.textContent = '0';
      el.className = 'hero-amount placeholder';
      note.textContent = 'テンキーで入力してください';
    } else {
      const v = parseFloat(state.amountStr);
      el.textContent = v.toLocaleString('ja-JP');
      el.className = 'hero-amount';
      if (state.tipPct > 0) {
        note.textContent = `チップ込み ¥${getTotal().toLocaleString('ja-JP')}`;
      } else {
        note.textContent = `${state.people}人で割ると ¥${getPerPerson().toLocaleString('ja-JP')}`;
      }
    }
  }

  // ===== People =====
  function changePeople(d) {
    state.people = Math.max(1, Math.min(20, state.people + d));
    document.getElementById('peopleCount').textContent = state.people;
    renderPips();
    initMembers();
    updatePerPersonPreview();
    updateHero();
    haptic();
  }

  // ===== Tip =====
  function setTip(pct) {
    state.tipPct = pct;
    ['tipOff','tip10','tip15','tip20'].forEach(id => {
      document.getElementById(id).className = 'tip-btn';
    });
    const map = {0:'tipOff',10:'tip10',15:'tip15',20:'tip20'};
    if (map[pct]) document.getElementById(map[pct]).className = 'tip-btn active';
    updateHero();
    updatePerPersonPreview();
    haptic();
  }

  // ===== Calculate =====
  function goCalc() {
    const total = getTotal();
    if (total <= 0) {
      flashError();
      showToast('金額を入力してください', 'toastCalc');
      return;
    }
    recalcMemberAmounts();
    renderResultScreen();
    renderMemberList();
    goTab('result');
    spawnConfetti();
    saveHistory();
  }

  function flashError() {
    const area = document.getElementById('numpadArea');
    area.classList.add('error-flash');
    setTimeout(() => area.classList.remove('error-flash'), 700);
    const hero = document.getElementById('heroAmount');
    hero.classList.add('error');
    setTimeout(() => hero.classList.remove('error'), 700);
  }

  // ===== Tilt =====
  function goToTilt() {
    if (getTotal() <= 0) {
      showToast('先に金額を入力してください', 'toastCalc');
      return;
    }
    recalcMemberAmounts();
    renderMemberList();
    updateTiltSummary();
    goTab('tilt');
  }

  function renderMemberList() {
    const list = document.getElementById('memberList');
    list.innerHTML = '';
    state.members.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'member-card';
      card.innerHTML = `
        <div class="mc-top">
          <div class="mc-avatar" style="background:${AVATAR_COLORS[i % AVATAR_COLORS.length]}">${m.name[0]}</div>
          <span class="mc-name">${m.name}</span>
          <div style="display:flex;gap:6px">
            <button class="mc-role ${m.role}" id="role-${i}" onclick="cycleRole(${i})">${ROLES[m.role]}</button>
          </div>
        </div>
        <div class="mc-amount-row">
          <span class="mc-amount-label">金額</span>
          <span style="font-size:13px;color:var(--t3)">¥</span>
          <input class="mc-amount-input" type="number" value="${m.amount}" id="mamount-${i}"
            oninput="updateMemberAmount(${i}, this.value)">
        </div>
      `;
      list.appendChild(card);
    });
  }

  function cycleRole(i) {
    const seq = ['normal','kanji','discount'];
    const cur = seq.indexOf(state.members[i].role);
    state.members[i].role = seq[(cur + 1) % seq.length];
    recalcMemberAmounts();
    renderMemberList();
    updateTiltSummary();
    haptic();
  }

  function updateMemberAmount(i, val) {
    state.members[i].amount = parseFloat(val) || 0;
    updateTiltSummary();
  }

  function updateTiltSummary() {
    const total = getTotal();
    const setTotal = state.members.reduce((s, m) => s + (m.amount || 0), 0);
    document.getElementById('tiltTotalDisp').textContent = '¥' + total.toLocaleString('ja-JP');
    document.getElementById('tiltSetDisp').textContent = '¥' + setTotal.toLocaleString('ja-JP');
    const pct = total > 0 ? Math.min(100, (setTotal / total) * 100) : 0;
    const ok = Math.abs(setTotal - total) < 100;
    const bar = document.getElementById('tiltBar');
    bar.style.width = pct + '%';
    bar.className = 'ts-bar-fill ' + (ok ? 'ok' : 'ng');
    const status = document.getElementById('tiltStatus');
    status.className = 'ts-status ' + (ok ? 'ok' : 'ng');
    if (ok) {
      status.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="6"/><path d="M3.5 6L5.5 8L8.5 4.5" stroke="white" stroke-width="1.5" fill="none"/></svg> 合計が一致しています`;
    } else {
      const diff = setTotal - total;
      status.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="6"/><path d="M6 3v4M6 8.5v1" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg> ${diff > 0 ? '+' : ''}¥${diff.toLocaleString('ja-JP')} のズレがあります`;
    }
  }

  function applyTilt() {
    renderResultScreen();
    goTab('result');
    spawnConfetti();
    saveHistory();
  }

  // ===== Result Screen =====
  function renderResultScreen() {
    const total = getTotal();
    const pp = getPerPerson();
    document.getElementById('resultPerPerson').textContent = pp.toLocaleString('ja-JP');
    document.getElementById('resultSub').textContent = `合計 ¥${total.toLocaleString('ja-JP')} ÷ ${state.people}人`;

    const list = document.getElementById('resultList');
    list.innerHTML = '';
    state.members.forEach((m, i) => {
      const row = document.createElement('div');
      row.className = 'result-row';
      row.style.animationDelay = (i * 0.06) + 's';
      row.innerHTML = `
        <div class="rr-avatar" style="background:${AVATAR_COLORS[i % AVATAR_COLORS.length]}">${m.name[0]}</div>
        <span class="rr-name">${m.name}</span>
        <span class="rr-role-badge ${m.role}">${ROLES[m.role]}</span>
        <span class="rr-amount">¥${(m.amount || pp).toLocaleString('ja-JP')}</span>
      `;
      list.appendChild(row);
    });
  }

  // ===== Confetti =====
  function spawnConfetti() {
    const container = document.getElementById('confettiContainer');
    container.innerHTML = '';
    const colors = ['#FF6B35','#FFB800','#FFE066','#FF8F61','#FFC947','#FFFFFF','#FF453A'];
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      const size = 6 + Math.random() * 8;
      const isCircle = Math.random() > 0.5;
      p.className = 'confetti-piece';
      p.style.cssText = `
        left:${Math.random()*100}%;
        top:0;
        width:${size}px;
        height:${isCircle ? size : size*0.6}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${isCircle ? '50%' : '2px'};
        animation-duration:${1.2 + Math.random()*1.6}s;
        animation-delay:${Math.random()*0.8}s;
      `;
      container.appendChild(p);
    }
    setTimeout(() => container.innerHTML = '', 4000);
  }

  // ===== History =====
  function saveHistory() {
    const total = getTotal();
    if (total <= 0) return;
    const emojis = ['🍻','🍺','🍣','🍜','🥂','🎉','🍱','🎂','🍕','🥘'];
    state.history.unshift({
      id: state.nextId++,
      title: `飲み会 ${new Date().getFullYear()}/${String(new Date().getMonth()+1).padStart(2,'0')}/${String(new Date().getDate()).padStart(2,'0')}`,
      people: state.people,
      total,
      perPerson: getPerPerson(),
      date: `${new Date().getFullYear()}/${String(new Date().getMonth()+1).padStart(2,'0')}/${String(new Date().getDate()).padStart(2,'0')}`,
      emoji: emojis[Math.floor(Math.random()*emojis.length)],
    });
    if (state.history.length > 10) state.history.pop();
    renderHistory();
  }

  function renderHistory() {
    const content = document.getElementById('historyContent');
    if (state.history.length === 0) {
      content.innerHTML = `
        <div class="history-empty">
          <div class="history-empty-icon">🧾</div>
          <div class="history-empty-title">履歴がまだありません</div>
          <div class="history-empty-sub">計算した結果がここに<br>自動で保存されます</div>
        </div>
      `;
      return;
    }
    content.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'history-list';
    state.history.forEach(h => {
      const card = document.createElement('div');
      card.className = 'history-card';
      card.id = 'hcard-' + h.id;
      let startX = 0;
      card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
      card.addEventListener('touchend', e => {
        const dx = startX - e.changedTouches[0].clientX;
        if (dx > 60) card.classList.add('swiped');
        else card.classList.remove('swiped');
      }, {passive:true});
      // Mouse support
      card.addEventListener('mousedown', e => { startX = e.clientX; });
      card.addEventListener('mouseup', e => {
        const dx = startX - e.clientX;
        if (dx > 40) card.classList.add('swiped');
        else card.classList.remove('swiped');
      });
      card.innerHTML = `
        <div class="hc-swipe-bg" onclick="deleteHistory(${h.id})">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><path d="M3 4h10l-1 10H4L3 4zm3-2h4v1H6V2zM2 4h12v1H2V4z"/></svg>
          削除
        </div>
        <div class="hc-main" onclick="reloadHistory(${h.id})">
          <div class="hc-icon">${h.emoji}</div>
          <div class="hc-info">
            <div class="hc-title">${h.title}</div>
            <div class="hc-meta">${h.people}人 · ${h.date}</div>
          </div>
          <div style="text-align:right">
            <div class="hc-amount">¥${h.perPerson.toLocaleString('ja-JP')}</div>
            <div class="hc-sub">合計 ¥${h.total.toLocaleString('ja-JP')}</div>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
    content.appendChild(list);
  }

  function deleteHistory(id) {
    const card = document.getElementById('hcard-' + id);
    if (card) {
      card.style.transform = 'translateX(100%)';
      card.style.opacity = '0';
      card.style.transition = 'all 0.3s';
      setTimeout(() => {
        state.history = state.history.filter(h => h.id !== id);
        renderHistory();
      }, 300);
    }
    haptic();
  }

  function clearHistory() {
    state.history = [];
    renderHistory();
  }

  function reloadHistory(id) {
    const h = state.history.find(x => x.id === id);
    if (!h) return;
    state.amountStr = String(h.total);
    state.people = h.people;
    document.getElementById('peopleCount').textContent = state.people;
    renderPips();
    initMembers();
    updateHero();
    updatePerPersonPreview();
    goTab('calc');
  }

  // ===== Navigation =====
  function goTab(tab) {
    const screens = { calc:'screen-calc', tilt:'screen-tilt', result:'screen-result', history:'screen-history' };
    const tabs = { calc:'tab-calc', tilt:'tab-tilt', result:'tab-result', history:'tab-history' };

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));

    const screen = document.getElementById(screens[tab]);
    if (screen) screen.classList.add('active');

    const tabEl = document.getElementById(tabs[tab]);
    if (tabEl) tabEl.classList.add('active');

    state.currentTab = tab;

    if (tab === 'tilt') {
      if (getTotal() <= 0) {
        showToast('先に金額を入力してください', 'toastCalc');
        goTab('calc');
        return;
      }
      recalcMemberAmounts();
      renderMemberList();
      updateTiltSummary();
    }
    if (tab === 'result' && getTotal() <= 0) {
      showToast('まだ計算していません', 'toastCalc');
      goTab('calc');
      return;
    }
  }

  // ===== Share Sheet =====
  function openShareSheet() {
    const overlay = document.getElementById('shareOverlay');
    const phone = document.getElementById('phone');
    overlay.style.position = 'absolute';
    overlay.style.borderRadius = '45px';
    overlay.classList.add('open');
    phone.style.overflow = 'hidden';
  }

  function closeShareSheet(e) {
    if (!e || e.target === document.getElementById('shareOverlay')) {
      document.getElementById('shareOverlay').classList.remove('open');
    }
  }

  function shareAction(target) {
    document.getElementById('shareOverlay').classList.remove('open');
    const total = getTotal();
    const pp = getPerPerson();
    const msg = `✨ワリカン名人\n合計: ¥${total.toLocaleString('ja-JP')}\n1人あたり: ¥${pp.toLocaleString('ja-JP')}\n(${state.people}人割り)`;
    showToast(`${target}で共有しました 🎉`, 'toastResult');
  }

  // ===== Toast =====
  function showToast(msg, id) {
    const toast = document.getElementById(id);
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ===== Haptic (CSS feedback) =====
  function haptic() {
    // Simulated with scale animation on active pseudo
  }

  // ===== Move share overlay inside phone =====
  function moveOverlay() {
    const phone = document.getElementById('phone');
    const overlay = document.getElementById('shareOverlay');
    phone.appendChild(overlay);
    overlay.style.position = 'absolute';
    overlay.style.inset = '0';
    overlay.style.borderRadius = '45px';
    overlay.style.overflow = 'hidden';
  }

  // ===== Run =====
  document.addEventListener('DOMContentLoaded', () => {
    moveOverlay();
    init();
    setTip(0);
  });
</script>
</body>
</html>
